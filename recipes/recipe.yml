---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: bucket-hat-os
description: Matthew's personal OS image.
base-image: quay.io/fedora-ostree-desktops/base-atomic
image-version: 43

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    install:
      packages:
        - Thunar
        - alacritty
        - blueman
        - dunst
        - gnome-keyring-pam
        - google-go-mono-fonts
        - gvfs
        - helix
        - kanshi
        - labwc
        - labwc-session
        - mksh
        - polkit
        - pulseaudio-utils
        - rofi
        - swaybg
        - swaylock
        - tmux
        - xdg-desktop-portal-wlr

  - type: default-flatpaks
    configurations:
      - notify: false
        scope: user
        install:
          - org.mozilla.firefox

  - type: signing
